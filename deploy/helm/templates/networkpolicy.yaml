{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "golusoris-app.fullname" . }}
  labels:
    {{- include "golusoris-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "golusoris-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        {{- end }}
        {{- if .Values.networkPolicy.ingressPodSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 12 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - {}  # allow all egress; restrict in app-specific values overlay
{{- end }}
