# Default values for golusoris-app.

replicaCount: 2

image:
  repository: ghcr.io/example/myapp
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  httpGet:
    path: /startupz
    port: http
  failureThreshold: 30
  periodSeconds: 2

env: {}
envFrom: []

config: {}  # key-value pairs → ConfigMap → envFrom

secrets: {}  # key-value pairs → Secret (base64 encoded by Helm)

networkPolicy:
  enabled: true
  ingressNamespaceSelector: {}
  ingressPodSelector: {}

ciliumNetworkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
  interval: 15s
  path: /metrics
  namespace: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Downward API env vars injected automatically (matches k8s/podinfo expectations)
downwardAPI:
  enabled: true
