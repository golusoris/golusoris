# Default values for golusoris-app.

replicaCount: 2

image:
  repository: ghcr.io/example/myapp
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  httpGet:
    path: /startupz
    port: http
  failureThreshold: 30
  periodSeconds: 2

env: {}
envFrom: []

config: {}  # key-value pairs → ConfigMap → envFrom

secrets: {}  # key-value pairs → Secret (base64 encoded by Helm)

networkPolicy:
  enabled: true
  ingressNamespaceSelector: {}
  ingressPodSelector: {}

ciliumNetworkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
  interval: 15s
  path: /metrics
  namespace: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Downward API env vars injected automatically (matches k8s/podinfo expectations)
downwardAPI:
  enabled: true

# ─────────────────────────────────────────────────────────────────────
# Scheduled pg_dump → S3/minio backup CronJob.
# Disabled by default. Enable + fill in s3.bucket + credentials secret.
# ─────────────────────────────────────────────────────────────────────
backup:
  enabled: false
  schedule: "0 2 * * *"          # 02:00 UTC daily
  dbName: app
  retentionDays: 14              # S3 lifecycle-style prune
  activeDeadlineSeconds: 3600    # job killswitch (1h)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  # Image with psql + aws CLI + coreutils. Default: amazonlinux-based
  # runner that bundles both. Swap for any image that has pg_dump and
  # aws CLI v2 on PATH.
  image:
    repository: ghcr.io/golusoris/pg-backup
    tag: "17.2"
    pullPolicy: IfNotPresent

  # Secret holding the database DSN. Key is the secret key name inside.
  databaseUrlSecret:
    name: myapp-db
    key: dsn

  # S3 (or any S3-compatible: minio, R2, B2, Wasabi).
  s3:
    bucket: ""
    prefix: ""                   # defaults to <fullname>-backups
    region: us-east-1
    # Leave empty for AWS S3. Set for minio (http://minio:9000), R2, etc.
    endpoint: ""
    credentialsSecret:
      name: myapp-backup-s3
