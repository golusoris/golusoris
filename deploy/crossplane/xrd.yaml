---
# Crossplane CompositeResourceDefinition (XRD) for a golusoris application stack.
# Defines the custom "AppStack" resource apps request from the platform team.
#
# Apply with:
#   kubectl apply -f xrd.yaml
#   kubectl apply -f composition.yaml
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xappstacks.platform.golusoris.io
spec:
  group: platform.golusoris.io
  names:
    kind: XAppStack
    plural: xappstacks
  claimNames:
    kind: AppStack
    plural: appstacks
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - region
              properties:
                name:
                  type: string
                  description: Application name (used as prefix for all resources).
                region:
                  type: string
                  description: Cloud region, e.g. eu-central-1.
                environment:
                  type: string
                  enum: [dev, staging, prod]
                  default: dev
                  description: Deployment environment tier.
                database:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    instanceClass:
                      type: string
                      default: db.t3.medium
                    storageGB:
                      type: integer
                      default: 20
                cache:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    nodeType:
                      type: string
                      default: cache.t3.micro
            status:
              type: object
              properties:
                dbEndpoint:
                  type: string
                cacheEndpoint:
                  type: string
