# Local dev stack template. Apps copy + adjust app service.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    build:
      context: ..
      dockerfile: tools/Dockerfile.template
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # db/pgx
      APP_DB_DSN: postgres://app:dev@postgres:5432/app?sslmode=disable
      # cache/redis (Step 8)
      APP_REDIS_URL: redis://redis:6379/0
      # log/
      LOG_LEVEL: debug
      LOG_FORMAT: tint
      # otel/ — point at a collector if you run one
      # APP_OTEL_SERVICE_NAME: myapp
      # APP_OTEL_ENDPOINT: otel-collector:4317
    ports:
      - "8080:8080"
    healthcheck:
      # k8s/health's /livez is HTTP-ok when the process is alive; Docker
      # Compose polls this for the service_healthy gate.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/livez"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Optional: Prometheus scraping the app. Uncomment + mount
  # tools/prometheus/prometheus.yml to collect metrics locally.
  # prometheus:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports:
  #     - "9090:9090"

volumes:
  pg_data:
  redis_data:
