# Local dev stack template. Apps copy + adjust app service.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  app:
    build:
      context: ..
      dockerfile: tools/Dockerfile.template
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://app:dev@postgres:5432/app?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: debug
      LOG_FORMAT: tint
    ports:
      - "8080:8080"

volumes:
  pg_data:
  redis_data:
