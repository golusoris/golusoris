# goreleaser config for the framework's own release.
#
# The framework ships as a Go library + two CLIs (`golusoris`,
# `golusoris-mcp`) — no Docker images. Downstream apps that want to
# publish OCI images use their own goreleaser config alongside the
# reusable .github/workflows/release-go.yml (which wires buildx +
# cosign + SBOM on the image). Keeping the framework release
# binary-only avoids the Dockerfile-context dance (goreleaser's docker
# build only sees dist/, not the source tree).
version: 2

project_name: golusoris

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: golusoris
    main: ./cmd/golusoris
    binary: golusoris
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: golusoris-mcp
    main: ./cmd/golusoris-mcp
    binary: golusoris-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))?!?:"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix(\\(.+\\))?!?:"
      order: 1
    - title: Performance
      regexp: "^.*perf(\\(.+\\))?:"
      order: 2
    - title: Breaking changes
      regexp: "^.*!:"
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --oidc-issuer=https://token.actions.githubusercontent.com
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
    output: true

release:
  github:
    owner: golusoris
    name: golusoris
  draft: false
  prerelease: auto
  mode: replace
