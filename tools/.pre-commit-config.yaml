# Pre-commit hooks template. Apps copy + adjust.
# Install: `pre-commit install`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.0.0
    hooks:
      - id: golangci-lint
        args: ["--config=tools/golangci.yml"]

  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w -extra
        language: system
        types: [go]
        pass_filenames: true

      - id: conventional-commit
        name: conventional commit
        entry: bash -c 'git log -1 --pretty=%s | grep -qE "^(feat|fix|chore|docs|refactor|test|perf|build|ci)(\(.+\))?!?:" || (echo "Commit message must follow Conventional Commits format" && exit 1)'
        language: system
        stages: [commit-msg]
        pass_filenames: false
