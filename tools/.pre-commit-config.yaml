# Pre-commit hooks template. Apps copy + adjust.
# Install: `pre-commit install`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.0.0
    hooks:
      - id: golangci-lint
        args: ["--config=tools/golangci.yml"]

  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w -extra
        language: system
        types: [go]
        pass_filenames: true

      # Custom SAST: golusoris invariants the AST-unaware linters can't express.
      # Shift-left mirror of the advisory ci.yml `semgrep` lane. Install semgrep
      # via `pipx install semgrep` (it is not a go tool). Whole-repo scan because
      # cross-file rules need the full tree, not just the staged delta.
      - id: custom-semgrep
        name: custom-semgrep (.semgrep.yml)
        entry: semgrep scan --config .semgrep.yml --error --metrics=off --disable-version-check --oss-only
        language: system
        types: [go]
        pass_filenames: false

      # Shift-left vulnerability scan. Previously CI-only; running it here catches
      # a vulnerable dependency before the push instead of after a CI round-trip.
      # Whole-module scan (govulncheck is call-graph based, not per-file).
      - id: govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: conventional-commit
        name: conventional commit
        entry: bash -c 'git log -1 --pretty=%s | grep -qE "^(feat|fix|chore|docs|refactor|test|perf|build|ci)(\(.+\))?!?:" || (echo "Commit message must follow Conventional Commits format" && exit 1)'
        language: system
        stages: [commit-msg]
        pass_filenames: false
