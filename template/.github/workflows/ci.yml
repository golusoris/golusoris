# Per-app CI — delegates to the reusable workflow in golusoris/golusoris.
# Replace @main with a pinned tag (e.g. @v0.3.0) for stability.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: golusoris/golusoris/.github/workflows/ci-go.yml@e6087a989e30b6f765e764846b1a496881b27f78 # main
    with:
      go-version-file: go.mod
      coverage-threshold: 70
      # Uncomment and set your Go module path to enable apidiff:
      # module-path: github.com/golusoris/app-CHANGEME

  codeql:
    uses: golusoris/golusoris/.github/workflows/codeql.yml@e6087a989e30b6f765e764846b1a496881b27f78 # main

  scorecard:
    uses: golusoris/golusoris/.github/workflows/scorecard.yml@e6087a989e30b6f765e764846b1a496881b27f78 # main
    secrets: inherit
