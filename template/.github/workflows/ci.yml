# Per-app CI — delegates to the reusable workflow in golusoris/golusoris.
# Refs are pinned to the v0.4.0 release commit; Renovate bumps them.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: golusoris/golusoris/.github/workflows/ci-go.yml@a4b9a56aad13729f4031fb172e0eceb1d19e5b36 # v0.5.0
    with:
      go-version-file: go.mod
      coverage-threshold: 70
      # Uncomment and set your Go module path to enable apidiff:
      # module-path: github.com/golusoris/app-CHANGEME

  codeql:
    uses: golusoris/golusoris/.github/workflows/codeql.yml@a4b9a56aad13729f4031fb172e0eceb1d19e5b36 # v0.5.0

  scorecard:
    uses: golusoris/golusoris/.github/workflows/scorecard.yml@a4b9a56aad13729f4031fb172e0eceb1d19e5b36 # v0.5.0
    secrets: inherit
