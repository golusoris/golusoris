# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@b5cc0eefa8a1a373f0deb108f6f3f1aa7d9a629c # main
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
