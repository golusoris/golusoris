# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@b8303b789c658817226a9828fecb14660cc538ea # v0.7.0
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
