# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@db0bd2b28919e5cec3cb09c6182cc81eafd9fbf5 # main
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
