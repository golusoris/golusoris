# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@7e79643e07ec17f56b9145f63c2b176c53eb282e # v0.6.1
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
