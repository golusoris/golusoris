# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@3df9f1aecdd771e6709487fcd620e416fa0714d1 # v0.4.0
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
