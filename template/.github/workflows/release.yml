# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@e6087a989e30b6f765e764846b1a496881b27f78 # main
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
