# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@a4b9a56aad13729f4031fb172e0eceb1d19e5b36 # v0.5.0
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
