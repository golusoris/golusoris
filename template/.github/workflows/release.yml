# Per-app release — delegates to the reusable workflow in golusoris/golusoris.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    uses: golusoris/golusoris/.github/workflows/release-go.yml@80bbb0f48a329475fc00c1208c77909acfb085d6 # v0.6.0
    with:
      image-name: ghcr.io/${{ github.repository }}
    secrets: inherit
