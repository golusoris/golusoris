# Reusable CI workflow for golusoris-based Go applications.
#
# Apps call it with:
#   jobs:
#     ci:
#       uses: golusoris/golusoris/.github/workflows/ci-go.yml@main
#       with:
#         go-version-file: go.mod
#         coverage-threshold: 70
#         module-path: github.com/myorg/myapp
name: ci-go (reusable)

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to go.mod for Go version resolution
        type: string
        default: go.mod
      golangci-version:
        description: golangci-lint version
        type: string
        default: latest
      lint-timeout:
        description: golangci-lint timeout
        type: string
        default: 5m
      test-timeout:
        description: go test timeout
        type: string
        default: 10m
      coverage-threshold:
        description: Minimum coverage percentage (0 = skip check)
        type: number
        default: 70
      module-path:
        description: Go module path for apidiff (e.g. github.com/myorg/myapp)
        type: string
        default: ""
      skip-apidiff:
        description: Skip apidiff check (set true for first release)
        type: boolean
        default: false
      openapi-spec:
        description: Path to OpenAPI spec file for spectral lint (empty = skip)
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # ── Conventional-commit PR title ──────────────────────────────────────────
  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|perf|ci|build|revert)(\(.+\))?(!)?: .+'; then
            echo "::error::PR title does not follow Conventional Commits."
            echo "::error::Got: $PR_TITLE"
            echo "::error::Expected: <type>(<scope>): <description>"
            echo "::error::Valid types: feat fix docs chore refactor test perf ci build revert"
            exit 1
          fi
          echo "OK: $PR_TITLE"

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: ${{ inputs.golangci-version }}
          args: --timeout=${{ inputs.lint-timeout }}

  # ── Security scan (gosec) ─────────────────────────────────────────────────
  gosec:
    name: Security (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          EXCLUDE_RULES="testutil/.*:G115,G404,G204;search/typesense/.*:G704;notify/apns2/.*:G704;notify/fcm/.*:G101;hash/.*:G304,G401,G505;auth/policy/.*:G401,G505;auth/oauth2server/.*:G117;storage/.*:G304;secrets/.*:G304;docs/epub/.*:G304;cmd/golusoris/.*:G204,G304;archive/.*:G302,G304;webhooks/in/.*:G505"
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" -fmt sarif -out gosec.sarif ./... || true
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" ./...
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: gosec.sarif
        continue-on-error: true

  # ── Vulnerability check ───────────────────────────────────────────────────
  vuln:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ── Tests + coverage ──────────────────────────────────────────────────────
  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: Run tests
        run: go test -race -count=1 -timeout=${{ inputs.test-timeout }} -coverprofile=coverage.out -covermode=atomic ./...
      - name: Check coverage threshold
        if: ${{ inputs.coverage-threshold > 0 }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !($COVERAGE < ${{ inputs.coverage-threshold }}) }"; then
            echo "::error::Coverage ${COVERAGE}% is below required ${{ inputs.coverage-threshold }}%"
            exit 1
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - run: go build ./...

  # ── OpenAPI spec lint (spectral) ─────────────────────────────────────────
  spectral:
    name: OpenAPI lint (spectral)
    if: ${{ inputs.openapi-spec != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install spectral (hash-pinned via lockfile)
        run: npm ci --prefix tools/spectral --no-audit --no-fund
      - name: Lint OpenAPI spec
        run: tools/spectral/node_modules/.bin/spectral lint ${{ inputs.openapi-spec }} --ruleset tools/spectral.yaml --fail-severity warn

  # ── API compatibility (apidiff vs previous tag) ───────────────────────────
  apidiff:
    name: API compatibility (apidiff)
    if: ${{ !inputs.skip-apidiff && inputs.module-path != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20250218142911-aa4b98e5adaa
      - name: Run apidiff vs previous tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — skipping apidiff (first release)"
            exit 0
          fi
          echo "Comparing HEAD against $PREV_TAG"
          apidiff -m ${{ inputs.module-path }} . > /tmp/current-api.txt 2>/dev/null || true
          CURRENT_SHA=$(git rev-parse HEAD)
          git stash --include-untracked --quiet || true
          git checkout --quiet "$PREV_TAG"
          apidiff -m ${{ inputs.module-path }} . > /tmp/prev-api.txt 2>/dev/null || true
          git checkout --quiet "$CURRENT_SHA"
          git stash pop --quiet || true
          if ! apidiff /tmp/prev-api.txt /tmp/current-api.txt; then
            echo "::error::Breaking API changes vs $PREV_TAG — add BREAKING CHANGE: footer or bump major version."
            exit 1
          fi
          echo "API is backwards-compatible with $PREV_TAG."
