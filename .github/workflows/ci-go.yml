# Reusable CI workflow for golusoris-based Go applications.
#
# Apps call it with:
#   jobs:
#     ci:
#       uses: golusoris/golusoris/.github/workflows/ci-go.yml@main
#       with:
#         go-version-file: go.mod
#         coverage-threshold: 70
#         module-path: github.com/myorg/myapp
name: ci-go (reusable)

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to go.mod for Go version resolution
        type: string
        default: go.mod
      prior-go-version:
        description: "Deprecated/unused — a prior-minor Go leg can't build a module whose go.mod requires the latest toolchain. Kept so callers that still pass it don't break."
        type: string
        default: ""
      golangci-version:
        description: golangci-lint version
        type: string
        default: v2.12.2
      golangci-config:
        description: Path to a golangci-lint config (empty = golangci-lint auto-discovers the caller's .golangci.yml; apps opt into a shared ruleset by setting this)
        type: string
        default: ""
      lint-timeout:
        description: golangci-lint timeout
        type: string
        default: 5m
      test-timeout:
        description: go test timeout
        type: string
        default: 10m
      needs-docker:
        description: Verify the Docker daemon is reachable before tests (testcontainers) — set false for apps with no container-backed tests
        type: boolean
        default: true
      container:
        description: "Container image to run the Go-compiling jobs in (empty = run directly on the runner). Apps whose build needs a custom image (cgo/system libs) set this. Linux-only — the macOS test leg always runs on the host."
        type: string
        default: ""
      system-packages:
        description: "Space-separated apt packages to install before the Go-compiling jobs (empty = none). For apps with cgo/system build deps on a debian-family runner or image."
        type: string
        default: ""
      coverage-threshold:
        description: Minimum coverage percentage (0 = skip check)
        type: number
        default: 70
      module-path:
        description: Go module path for apidiff (e.g. github.com/myorg/myapp)
        type: string
        default: ""
      skip-apidiff:
        description: Skip apidiff check (set true for first release)
        type: boolean
        default: false
      openapi-spec:
        description: Path to OpenAPI spec file for spectral lint (empty = skip)
        type: string
        default: ""
      spectral-ruleset:
        description: Path to a Spectral ruleset (empty = spectral's built-in oas ruleset)
        type: string
        default: ""
      spectral-version:
        description: "@stoplight/spectral-cli version to run via npx"
        type: string
        default: 6.15.0
      spectral-fail-severity:
        description: Minimum severity that fails the spectral lint (error|warn|info|hint)
        type: string
        default: warn

permissions:
  contents: read

jobs:
  # ── Conventional-commit PR title ──────────────────────────────────────────
  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|perf|ci|build|revert)(\(.+\))?(!)?: .+'; then
            echo "::error::PR title does not follow Conventional Commits."
            echo "::error::Got: $PR_TITLE"
            echo "::error::Expected: <type>(<scope>): <description>"
            echo "::error::Valid types: feat fix docs chore refactor test perf ci build revert"
            exit 1
          fi
          echo "OK: $PR_TITLE"

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    timeout-minutes: 10
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: ${{ inputs.golangci-version }}
          # Pass --config only when the caller supplies one; otherwise golangci-lint
          # auto-discovers the app's own .golangci.yml (issue #197).
          args: ${{ inputs.golangci-config != '' && format('--config={0} --timeout={1}', inputs.golangci-config, inputs.lint-timeout) || format('--timeout={0}', inputs.lint-timeout) }}

  # ── Security scan (gosec) ─────────────────────────────────────────────────
  gosec:
    name: Security (gosec)
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          EXCLUDE_RULES="testutil/.*:G115,G404,G204;search/typesense/.*:G704;notify/apns2/.*:G704;notify/fcm/.*:G101;hash/.*:G304,G401,G505;auth/policy/.*:G401,G505;auth/oauth2server/.*:G117;storage/.*:G304;secrets/.*:G304;docs/epub/.*:G304;cmd/golusoris/.*:G204,G304;archive/.*:G302,G304;webhooks/in/.*:G505"
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" -fmt sarif -out gosec.sarif ./... || true
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" ./...
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: gosec.sarif
        continue-on-error: true

  # ── Vulnerability check ───────────────────────────────────────────────────
  vuln:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    timeout-minutes: 10
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ── Tests + coverage ──────────────────────────────────────────────────────
  # Matrix across OS (ubuntu + macos) and Go (go.mod version + prior minor).
  # Only the primary leg (ubuntu + go.mod) gates coverage and uploads the
  # artifact; the other legs are portability/forward-compat signal. Docker-
  # requiring tests run on ubuntu only (macos runners have no Docker daemon).
  test:
    name: Test (race + coverage)
    runs-on: ${{ matrix.os }}
    # Container is Linux-only; the macOS portability leg always runs on the host.
    container: ${{ matrix.os == 'ubuntu-latest' && inputs.container || '' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: [stable]
        include:
          - os: ubuntu-latest
            go: stable
            primary: true
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' && runner.os == 'Linux' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      # Fail fast with a clear signal if testcontainers have no Docker daemon
      # (matches ci.yml's own preflight — issue #198).
      - name: Verify Docker is reachable
        if: ${{ inputs.needs-docker && runner.os == 'Linux' }}
        run: docker info
      - name: Run tests (Linux — full suite)
        if: runner.os == 'Linux'
        run: go test -race -count=1 -timeout=${{ inputs.test-timeout }} -coverprofile=coverage.out -covermode=atomic ./...
      - name: Run tests (macOS — skip Docker-requiring packages)
        if: runner.os != 'Linux'
        run: |
          # macOS runners lack a Docker daemon; exclude testcontainers-backed
          # packages so this portability leg passes instead of failing on infra.
          # macOS ships bash 3.2 (no mapfile); word-split is safe — Go import
          # paths never contain spaces.
          PKGS=$(go list ./... | grep -vE '/testutil(/|$)|/testutil/pg' || true)
          # shellcheck disable=SC2086
          go test -race -count=1 -timeout=${{ inputs.test-timeout }} $PKGS
      - name: Check coverage threshold
        if: ${{ matrix.primary && inputs.coverage-threshold > 0 }}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !($COVERAGE < ${{ inputs.coverage-threshold }}) }"; then
            echo "::error::Coverage ${COVERAGE}% is below required ${{ inputs.coverage-threshold }}%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: matrix.primary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    timeout-minutes: 10
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - run: go build ./...

  # ── OpenAPI spec lint (spectral) ─────────────────────────────────────────
  # Caller-driven: lints the spec named by `openapi-spec` from the CALLER's
  # checkout, using the caller's `spectral-ruleset` (or Spectral's built-in oas
  # ruleset when none is given). No dependency on the framework's tools/ dir, so
  # downstream apps can lint their own spec without vendoring tools/spectral.
  spectral:
    name: OpenAPI lint (spectral)
    if: ${{ inputs.openapi-spec != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Lint OpenAPI spec
        env:
          SPEC: ${{ inputs.openapi-spec }}
          RULESET: ${{ inputs.spectral-ruleset }}
          SPECTRAL_VERSION: ${{ inputs.spectral-version }}
          FAIL_SEVERITY: ${{ inputs.spectral-fail-severity }}
        run: |
          set -euo pipefail
          ARGS=(lint "$SPEC" --fail-severity "$FAIL_SEVERITY")
          if [ -n "$RULESET" ]; then
            ARGS+=(--ruleset "$RULESET")
          fi
          # No ruleset → Spectral auto-loads its built-in `spectral:oas` ruleset.
          npx --yes "@stoplight/spectral-cli@${SPECTRAL_VERSION}" "${ARGS[@]}"

  # ── API compatibility (apidiff vs previous tag) ───────────────────────────
  apidiff:
    name: API compatibility (apidiff)
    if: ${{ !inputs.skip-apidiff && inputs.module-path != '' }}
    runs-on: ubuntu-latest
    container: ${{ inputs.container }}
    timeout-minutes: 10
    steps:
      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        shell: bash
        run: |
          SUDO=""; command -v sudo >/dev/null 2>&1 && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends ${{ inputs.system-packages }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20250218142911-aa4b98e5adaa
      - name: Run apidiff vs previous tag (informational pre-1.0)
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — skipping apidiff (first release)"
            exit 0
          fi
          MOD="${{ inputs.module-path }}"
          echo "Comparing HEAD against $PREV_TAG"
          apidiff -m -w /tmp/cur-api.txt "$MOD"
          git worktree add -q --detach /tmp/apidiff-prev "$PREV_TAG"
          ( cd /tmp/apidiff-prev && go mod download && apidiff -m -w /tmp/prev-api.txt "$MOD" ) \
            || echo "::warning::could not export $PREV_TAG API"
          git worktree remove /tmp/apidiff-prev --force || true
          echo "## API changes vs $PREV_TAG"
          apidiff /tmp/prev-api.txt /tmp/cur-api.txt \
            || echo "::warning::apidiff comparison unavailable (export-data version mismatch)"
          # Pre-1.0 informational; gate on `apidiff -incompatible` at v1.0.
