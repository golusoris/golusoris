# OSSF Scorecard — runs on the framework itself AND is callable as a
# reusable workflow by downstream apps.
#
# Scorecard requires:
#   - global permissions read-only (contents: read only)
#   - security-events: write and id-token: write set at the JOB level only
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '15 6 * * 1'   # weekly Monday 06:15 UTC

  workflow_call:

# Global permissions must be read-only for Scorecard publish_results to work.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # Fine-grained PAT with `Administration: Read-only` +
          # `Contents: Read-only` + `Metadata: Read-only` + `Webhooks:
          # Read-only`. Required for the Branch-Protection + Webhooks
          # checks — the default GITHUB_TOKEN can't read classic branch
          # protection rules. Docs:
          # https://github.com/ossf/scorecard-action/blob/main/docs/authentication/fine-grained-auth-token.md
          # Secret is optional — the action falls back to GITHUB_TOKEN
          # and those two checks remain unscored (-1).
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
