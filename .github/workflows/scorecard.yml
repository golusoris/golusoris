# OSSF Scorecard — runs on the framework itself AND is callable as a
# reusable workflow by downstream apps.
#
# Scorecard requires:
#   - global permissions read-only (contents: read only)
#   - security-events: write and id-token: write set at the JOB level only
name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '15 6 * * 1'   # weekly Monday 06:15 UTC

  workflow_call:

# Global permissions must be read-only for Scorecard publish_results to work.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
