name: Auto-assign

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const number = context.payload.issue
              ? context.payload.issue.number
              : context.payload.pull_request.number;
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: number,
              assignees: ['lusoris'],
            });
