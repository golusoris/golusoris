name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Conventional-commit PR title ────────────────────────────────────────────
  pr-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|perf|ci|build|revert)(\(.+\))?(!)?: .+'; then
            echo "::error::PR title does not follow Conventional Commits."
            echo "::error::Got: $PR_TITLE"
            echo "::error::Expected: <type>(<scope>): <description>"
            echo "::error::Valid types: feat fix docs chore refactor test perf ci build revert"
            exit 1
          fi
          echo "OK: $PR_TITLE"

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          # Pinned for reproducible CI — bumping golangci-lint (and adopting any
          # new linter findings) is a deliberate, reviewed change, not a float.
          version: v2.12.2
          args: --config=tools/golangci.yml --timeout=5m

  # ── Security scan (gosec) ───────────────────────────────────────────────────
  gosec:
    name: Security (gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          EXCLUDE_RULES="testutil/.*:G115,G404,G204;search/typesense/.*:G704;notify/apns2/.*:G704;notify/fcm/.*:G101;hash/.*:G304,G401,G505;auth/policy/.*:G401,G505;auth/oauth2server/.*:G117;storage/.*:G304;secrets/.*:G304;docs/epub/.*:G304;cmd/golusoris/.*:G204,G304;archive/.*:G302,G304;webhooks/in/.*:G505"
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" -fmt sarif -out gosec.sarif ./... || true
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" ./...
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: gosec.sarif
        continue-on-error: true   # SARIF upload requires Advanced Security (private repos)

  # ── Vulnerability check ─────────────────────────────────────────────────────
  vuln:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ── Tests + coverage ────────────────────────────────────────────────────────
  # Matrix across OS (ubuntu + macos). The primary leg (ubuntu) owns the
  # coverage gate + artifact upload; the macos leg is portability signal.
  # Docker-requiring tests (testutil/pg) run on ubuntu only — macos runners have
  # no Docker daemon, so testcontainers-backed packages skip there.
  # NOTE: no "prior Go minor" leg — go.mod requires the latest toolchain, so an
  # older Go refuses to build the module; the go: [stable] axis is kept solely
  # to preserve the required-check name "Test (race + coverage) (…, stable)".
  test:
    name: Test (race + coverage)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: [stable]
        include:
          # Primary leg: ubuntu. Owns coverage gate + upload.
          - os: ubuntu-latest
            go: stable
            primary: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      # Docker is preinstalled on ubuntu-latest runners — testutil/pg needs it.
      - name: Verify Docker is reachable
        if: runner.os == 'Linux'
        run: docker info
      # On macOS there is no Docker daemon; skip the testcontainers-backed
      # packages so the portability leg passes instead of failing on infra.
      - name: Run tests (Linux — full suite with Docker)
        if: runner.os == 'Linux'
        run: go test -race -count=1 -timeout=10m -coverprofile=coverage.out -covermode=atomic ./...
      - name: Run tests (macOS — skip Docker-requiring packages)
        if: runner.os != 'Linux'
        run: |
          # testutil/pg and its dependents need a Docker daemon (testcontainers),
          # which macOS runners lack. Exclude those packages so the leg still
          # exercises the pure-Go code paths for portability signal.
          # macOS ships bash 3.2, which has no `mapfile`; word-splitting is safe
          # here because Go import paths never contain spaces.
          PKGS=$(go list ./... | grep -vE '/testutil(/|$)|/testutil/pg' || true)
          # shellcheck disable=SC2086
          go test -race -count=1 -timeout=10m $PKGS
      - name: Check coverage threshold (70%)
        if: matrix.primary
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !($COVERAGE < 70) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the required 70%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: matrix.primary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  # ── OpenAPI spec lint (spectral) ─────────────────────────────────────────────
  # The framework has no single openapi.yaml (apps generate their own with ogen).
  # This step lints the example app spec if present; apps use ci-go.yml's
  # openapi-spec input to wire spectral for their own spec.
  spectral:
    name: OpenAPI lint (spectral)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check if example spec exists
        id: spec-check
        run: |
          if [ -f examples/full/openapi.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install spectral (hash-pinned via lockfile)
        if: steps.spec-check.outputs.exists == 'true'
        run: npm ci --prefix tools/spectral --no-audit --no-fund
      - name: Lint spec
        if: steps.spec-check.outputs.exists == 'true'
        run: tools/spectral/node_modules/.bin/spectral lint examples/full/openapi.yaml --ruleset tools/spectral.yaml --fail-severity warn
      - name: No spec to lint
        if: steps.spec-check.outputs.exists != 'true'
        run: echo "No OpenAPI spec found at examples/full/openapi.yaml — skipping spectral."

  # ── API compatibility (apidiff vs previous tag) ──────────────────────────────
  apidiff:
    name: API compatibility (apidiff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0   # need full history for git describe
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20250218142911-aa4b98e5adaa
      - name: Run apidiff vs previous tag (informational pre-1.0)
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — skipping apidiff (first release)"
            exit 0
          fi
          MOD=github.com/golusoris/golusoris
          echo "Comparing HEAD against $PREV_TAG"

          # Correct export form: `apidiff -m -w FILE MODULE`, run in the module dir.
          apidiff -m -w /tmp/cur-api.txt "$MOD"

          # Export the previous tag from an isolated worktree (no stash dance).
          git worktree add -q --detach /tmp/apidiff-prev "$PREV_TAG"
          ( cd /tmp/apidiff-prev && go mod download && apidiff -m -w /tmp/prev-api.txt "$MOD" ) \
            || echo "::warning::could not export $PREV_TAG API"
          git worktree remove /tmp/apidiff-prev --force || true

          echo "## API changes vs $PREV_TAG"
          apidiff /tmp/prev-api.txt /tmp/cur-api.txt \
            || echo "::warning::apidiff comparison unavailable (export-data version mismatch)"

          # Pre-1.0 (SemVer v0.x) permits breaking changes, so this is INFORMATIONAL.
          # At v1.0, gate on incompatibles:
          #   apidiff -incompatible /tmp/prev-api.txt /tmp/cur-api.txt | tee /tmp/inc
          #   [ -s /tmp/inc ] && { echo "::error::breaking API change"; exit 1; } || true

  # ── Dependency review (PR-only supply-chain gate) ────────────────────────────
  # Diffs the PR's dependency manifest/lockfile changes and fails on
  # high/critical advisories or copyleft (GPL/AGPL) licences entering the tree.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # Block copyleft licences that would impose obligations on adopters.
          # Lists both the `-or-later` (preferred) and plain SPDX forms so a
          # dependency declaring either variant is caught.
          deny-licenses: >-
            GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later,
            AGPL-3.0-only, AGPL-3.0-or-later

  # ── Secret scan (gitleaks) ───────────────────────────────────────────────────
  # Scans the PR diff (and full history on push) for committed secrets.
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits
      # The gitleaks-action wrapper requires a paid GITLEAKS_LICENSE for ORG
      # repos; the gitleaks binary itself is free (MIT). Run it directly with
      # the repo's .gitleaks.toml. Native secret-scanning + push-protection are
      # the first line; this adds a full-history custom-regex sweep.
      - name: gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git . -c .gitleaks.toml --redact --no-banner --verbose

  # ── Changelog fragments (render --check) ─────────────────────────────────────
  # Validates the per-PR changelog.d/ fragments and that the rendered body
  # matches the "## [Unreleased]" block in CHANGELOG.md. Advisory: a drift here
  # should not block merging a code PR — run scripts/changelog/render.sh --write
  # locally to resync. See changelog.d/README.md.
  changelog:
    name: Changelog fragments (render --check)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Render check
        run: bash scripts/changelog/render.sh --check

  # ── Aggregate gate ───────────────────────────────────────────────────────────
  # Single "green only if every gating job passed" check, so branch protection
  # can require ONE stable context instead of enumerating each job (whose names
  # shift when the test matrix changes). CodeQL is a separate workflow and stays
  # its own required check.
  ci-success:
    name: CI success
    if: always()
    needs: [lint, gosec, vuln, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all gating jobs passed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "gating results: $results"
          case ",$results," in
            *,failure,*|*,cancelled,*) echo "::error::a gating job did not pass: $results"; exit 1 ;;
          esac
          echo "all gating jobs passed"
