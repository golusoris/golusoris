name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Conventional-commit PR title ────────────────────────────────────────────
  pr-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|perf|ci|build|revert)(\(.+\))?(!)?: .+'; then
            echo "::error::PR title does not follow Conventional Commits."
            echo "::error::Got: $PR_TITLE"
            echo "::error::Expected: <type>(<scope>): <description>"
            echo "::error::Valid types: feat fix docs chore refactor test perf ci build revert"
            exit 1
          fi
          echo "OK: $PR_TITLE"

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest
          args: --config=tools/golangci.yml --timeout=5m

  # ── Security scan (gosec) ───────────────────────────────────────────────────
  gosec:
    name: Security (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          EXCLUDE_RULES="testutil/.*:G115,G404,G204;search/typesense/.*:G704;notify/apns2/.*:G704;notify/fcm/.*:G101;hash/.*:G304,G401,G505;auth/policy/.*:G401,G505;auth/oauth2server/.*:G117;storage/.*:G304;secrets/.*:G304;docs/epub/.*:G304;cmd/golusoris/.*:G204,G304;archive/.*:G302,G304;webhooks/in/.*:G505"
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" -fmt sarif -out gosec.sarif ./... || true
          gosec -exclude-generated --exclude-rules="$EXCLUDE_RULES" ./...
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: gosec.sarif
        continue-on-error: true   # SARIF upload requires Advanced Security (private repos)

  # ── Vulnerability check ─────────────────────────────────────────────────────
  vuln:
    name: Vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Tests + coverage ────────────────────────────────────────────────────────
  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    # Docker is preinstalled on ubuntu-latest runners — testutil/pg needs it.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify Docker is reachable
        run: docker info
      - name: Run tests
        run: go test -race -count=1 -timeout=10m -coverprofile=coverage.out -covermode=atomic ./...
      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !($COVERAGE < 70) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the required 70%"
            exit 1
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  # ── OpenAPI spec lint (spectral) ─────────────────────────────────────────────
  # The framework has no single openapi.yaml (apps generate their own with ogen).
  # This step lints the example app spec if present; apps use ci-go.yml's
  # openapi-spec input to wire spectral for their own spec.
  spectral:
    name: OpenAPI lint (spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check if example spec exists
        id: spec-check
        run: |
          if [ -f examples/full/openapi.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install spectral
        if: steps.spec-check.outputs.exists == 'true'
        run: npm install -g @stoplight/spectral-cli
      - name: Lint spec
        if: steps.spec-check.outputs.exists == 'true'
        run: spectral lint examples/full/openapi.yaml --ruleset tools/spectral.yaml --fail-severity warn
      - name: No spec to lint
        if: steps.spec-check.outputs.exists != 'true'
        run: echo "No OpenAPI spec found at examples/full/openapi.yaml — skipping spectral."

  # ── API compatibility (apidiff vs previous tag) ──────────────────────────────
  apidiff:
    name: API compatibility (apidiff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # need full history for git describe
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@latest
      - name: Run apidiff vs previous tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — skipping apidiff (first release)"
            exit 0
          fi
          echo "Comparing HEAD against $PREV_TAG"

          # Export current API
          apidiff -m github.com/golusoris/golusoris . > /tmp/current-api.txt 2>/dev/null || true

          # Save current work and check out the previous tag
          CURRENT_SHA=$(git rev-parse HEAD)
          git stash --include-untracked --quiet || true
          git checkout --quiet "$PREV_TAG"

          # Export previous API
          apidiff -m github.com/golusoris/golusoris . > /tmp/prev-api.txt 2>/dev/null || true

          # Restore
          git checkout --quiet "$CURRENT_SHA"
          git stash pop --quiet || true

          # Diff — non-zero exit if incompatible changes detected
          if ! apidiff /tmp/prev-api.txt /tmp/current-api.txt; then
            echo ""
            echo "::error::Breaking API changes detected vs $PREV_TAG."
            echo "::error::Add a 'BREAKING CHANGE:' or '!' footer to the commit, or bump the major version."
            exit 1
          fi
          echo "API is backwards-compatible with $PREV_TAG."
