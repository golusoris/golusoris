# Reusable release workflow for golusoris-based Go applications.
# Runs on version tags (v*.*.*) and produces:
#   - Multi-arch OCI image pushed to GHCR
#   - syft SBOM attached to release
#   - cosign keyless signature
#   - SLSA provenance (via slsa-framework/slsa-github-generator)
#
# Apps call it with:
#   jobs:
#     release:
#       uses: golusoris/golusoris/.github/workflows/release-go.yml@main
#       secrets: inherit
name: release-go (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: OCI image name (e.g. ghcr.io/myorg/myapp)
        type: string
        required: true
      go-version-file:
        description: Path to go.mod
        type: string
        default: go.mod
      goreleaser-config:
        description: Path to .goreleaser.yml
        type: string
        default: tools/.goreleaser.yml
    secrets:
      COSIGN_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless + SLSA
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --config=${{ inputs.goreleaser-config }} --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ inputs.image-name }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.goreleaser.outputs.digest }}
          push-to-registry: true
