# Reusable release workflow for golusoris-based Go applications.
# Runs on version tags (v*.*.*) and produces:
#   - Multi-arch OCI image pushed to GHCR
#   - syft SBOM (SPDX) uploaded to the GitHub Release + attested
#   - cosign keyless signature (via goreleaser)
#   - SLSA build provenance via actions/attest-build-provenance (in-toto
#     attestation pushed to the registry). NOTE: provenance is emitted by
#     actions/attest-build-provenance, NOT slsa-framework/slsa-github-generator.
#
# Apps call it with:
#   jobs:
#     release:
#       uses: golusoris/golusoris/.github/workflows/release-go.yml@main
#       secrets: inherit
name: release-go (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: OCI image name (e.g. ghcr.io/myorg/myapp)
        type: string
        required: true
      go-version-file:
        description: Path to go.mod
        type: string
        default: go.mod
      goreleaser-config:
        description: Path to .goreleaser.yml
        type: string
        default: tools/.goreleaser.yml
    secrets:
      COSIGN_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write   # needed for cosign keyless + SLSA
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: latest
          args: release --config=${{ inputs.goreleaser-config }} --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve pushed image digest
        id: digest
        run: |
          set -euo pipefail
          # goreleaser-action exposes no digest output; resolve it from the
          # registry for the tag goreleaser just pushed.
          DIGEST=$(docker buildx imagetools inspect \
            "${{ inputs.image-name }}:${{ github.ref_name }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ inputs.image-name }}@${{ steps.digest.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # SBOM is generated above but was never attached — upload it so the
          # release carries the SPDX SBOM alongside the goreleaser artifacts.
          gh release upload "${{ github.ref_name }}" sbom.spdx.json --clobber

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ inputs.image-name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
