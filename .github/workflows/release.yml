# Framework release — triggers on v*.*.* tag push.
#
# The framework ships Go library + two CLIs (no Docker image), so this
# workflow runs goreleaser directly instead of calling the reusable
# release-go.yml (which is aimed at app repos that DO build images).
#
# Produces:
#   - Multi-arch tarballs (+ zip on windows) for cmd/golusoris and cmd/golusoris-mcp
#   - checksums.txt, checksums.txt.sig + .pem (cosign keyless)
#   - SPDX SBOMs on the archives (syft)
#   - SLSA-L3 provenance on all release artifacts (actions/attest-build-provenance)
name: release

on:
  push:
    tags:
      - 'v*.*.*'
  # Auto-invoked by release-please.yml on release_created, passing the freshly
  # cut tag. Bot-cut tags don't fire the push trigger above (GitHub doesn't run
  # workflows for GITHUB_TOKEN-created tags), so release-please calls this
  # workflow directly in the same run — no PAT, no manual dispatch needed.
  workflow_call:
    inputs:
      tag:
        description: 'Existing vX.Y.Z tag to build + sign the release for'
        required: true
        type: string
  # Manual escape hatch: (re)build + sign an existing tag's artifacts on demand.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing vX.Y.Z tag to build + sign the release for'
        required: true
        type: string

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # create the GitHub Release + upload artifacts
      id-token: write       # cosign keyless OIDC + SLSA
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3 # pin 2.x — cosign 3.x rejects the goreleaser signs --oidc-issuer arg

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          # On a dispatched rebuild of an already-cut tag, skip the before-hooks:
          # the tag's immutable tree may carry a stale/broken hook (e.g. the
          # pre-fix `go generate` eBPF clang compile). Binaries still build from
          # the tag's committed Go source + go.sum — hooks are only orchestration.
          args: >-
            release --config=tools/.goreleaser.yml --clean
            ${{ inputs.tag != '' && '--skip=before' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On dispatch, force the tag goreleaser builds; empty on push (it uses the pushed tag).
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}

      - name: Attest release archives
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          # Also attest the per-archive SPDX SBOMs goreleaser emits, so the
          # header's "provenance on all release artifacts" holds directly, not
          # just transitively via the attested checksums.txt (issue #192).
          subject-path: 'dist/*.tar.gz,dist/*.zip,dist/checksums.txt,dist/*.sbom.json'
