# Framework release — triggers on v*.*.* tag push.
#
# The framework ships Go library + two CLIs (no Docker image), so this
# workflow runs goreleaser directly instead of calling the reusable
# release-go.yml (which is aimed at app repos that DO build images).
#
# Produces:
#   - Multi-arch tarballs (+ zip on windows) for cmd/golusoris and cmd/golusoris-mcp
#   - checksums.txt, checksums.txt.sig + .pem (cosign keyless)
#   - SPDX SBOMs on the archives (syft)
#   - SLSA-L3 provenance on all release artifacts (actions/attest-build-provenance)
name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release + upload artifacts
      id-token: write       # cosign keyless OIDC + SLSA
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --config=tools/.goreleaser.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archives
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: 'dist/*.tar.gz,dist/*.zip,dist/checksums.txt'
