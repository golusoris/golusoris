# release-please — opens / updates a release PR on every push to main
# that accumulates Conventional Commits into a CHANGELOG entry and bumps
# the version per SemVer rules. Merging the PR tags vX.Y.Z, which fires
# release.yml → release-go.yml (goreleaser + cosign + SBOM + SLSA).
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
