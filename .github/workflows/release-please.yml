# release-please — opens / updates a release PR on every push to main
# that accumulates Conventional Commits into a CHANGELOG entry and bumps
# the version per SemVer rules. Merging the PR tags vX.Y.Z, which fires
# release.yml → release-go.yml (goreleaser + cosign + SBOM + SLSA).
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
