# release-please — opens / updates a release PR on every push to main
# that accumulates Conventional Commits into a CHANGELOG entry and bumps
# the version per SemVer rules. Merging the PR tags vX.Y.Z, which fires
# release.yml → release-go.yml (goreleaser + cosign + SBOM + SLSA).
name: release-please

# Serialize release-PR maintenance; cancel a stale run when a newer push
# supersedes it (#196). The actual release runs on tag push in release.yml.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
