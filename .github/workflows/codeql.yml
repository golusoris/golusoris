# CodeQL Go scanning — runs on the framework itself AND is callable as a
# reusable workflow by downstream apps.
name: CodeQL

# Cancel a stale run when a newer commit supersedes it (#196).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Run on the framework's own pushes/PRs
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 7 * * 1'   # weekly Monday 07:30 UTC

  # Also callable as a reusable workflow from downstream apps
  workflow_call:
    inputs:
      go-version-file:
        type: string
        default: go.mod

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file || 'go.mod' }}
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: go
          queries: security-extended,security-and-quality
      - name: Build
        run: go build ./...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:go"
