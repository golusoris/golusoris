# CodeQL Go scanning — runs on the framework itself AND is callable as a
# reusable workflow by downstream apps.
name: CodeQL

on:
  # Run on the framework's own pushes/PRs
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 7 * * 1'   # weekly Monday 07:30 UTC

  # Also callable as a reusable workflow from downstream apps
  workflow_call:
    inputs:
      go-version-file:
        type: string
        default: go.mod

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file || 'go.mod' }}
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended,security-and-quality
      - name: Build
        run: go build ./...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
