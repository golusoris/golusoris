# CodeQL Go scanning — runs on the framework itself AND is callable as a
# reusable workflow by downstream apps.
name: CodeQL

on:
  # Run on the framework's own pushes/PRs
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 7 * * 1'   # weekly Monday 07:30 UTC

  # Also callable as a reusable workflow from downstream apps
  workflow_call:
    inputs:
      go-version-file:
        type: string
        default: go.mod

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file || 'go.mod' }}
          cache: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: go
          queries: security-extended,security-and-quality
      - name: Build
        run: go build ./...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:go"
