# Reusable workflow: rebuild + re-sign OCI image when Renovate bumps the base image digest.
#
# Apps call it with:
#   jobs:
#     rebuild:
#       uses: golusoris/golusoris/.github/workflows/rebuild-on-base.yml@main
#       with:
#         image-name: ghcr.io/myorg/myapp
#       secrets: inherit
#
# Wire Renovate to trigger it by adding a "postUpgradeTasks" section in renovate.json
# that dispatches a repository_dispatch event of type "base-image-updated".
name: rebuild-on-base (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: OCI image name (e.g. ghcr.io/myorg/myapp)
        type: string
        required: true
      go-version-file:
        description: Path to go.mod
        type: string
        default: go.mod
      goreleaser-config:
        description: Path to .goreleaser.yml
        type: string
        default: tools/.goreleaser.yml
      platforms:
        description: Comma-separated build platforms
        type: string
        default: linux/amd64,linux/arm64
    secrets:
      COSIGN_PASSWORD:
        required: false

  # Allow manual trigger from downstream repos via repository_dispatch
  repository_dispatch:
    types: [base-image-updated]

permissions:
  contents: read

jobs:
  rebuild:
    name: Rebuild on base update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.go-version-file || 'go.mod' }}
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current image tag
        id: tag
        run: |
          # Use the latest git tag if available, otherwise use the short SHA
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "sha-$(git rev-parse --short HEAD)")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push (base rebuild)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          context: .
          file: tools/Dockerfile.template
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          no-cache: true   # force fresh base layer pull
          tags: |
            ${{ inputs.image-name }}:${{ steps.tag.outputs.tag }}-base-rebuild
            ${{ inputs.image-name }}:${{ steps.tag.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ inputs.image-name }}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            "${{ inputs.image-name }}@${{ steps.build.outputs.digest }}"
