version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels: ["dependencies", "github-actions"]
    groups:
      actions-minor:
        update-types: ["minor", "patch"]

  # ── Main Go module ──────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 15
    labels: ["dependencies", "go"]
    groups:
      golusoris-internal:
        patterns: ["github.com/golusoris/*"]
      otel:
        patterns: ["go.opentelemetry.io/*"]
      k8s:
        patterns: ["k8s.io/*", "sigs.k8s.io/*"]
      aws:
        patterns: ["github.com/aws/*"]
      uber-fx:
        patterns: ["go.uber.org/fx*"]

  # ── Sub-modules (own go.mod) ────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /hw/fssnap
    schedule:
      interval: weekly
    labels: ["dependencies", "go", "hw"]

  - package-ecosystem: gomod
    directory: /hw/gpio
